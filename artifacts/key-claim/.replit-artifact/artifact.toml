kind = "web"
previewPath = "/"
title = "密钥领取"
version = "1.0.0"
id = "artifacts/key-claim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20612

[services.development]
run = "pnpm --filter @workspace/key-claim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/key-claim", "run", "build" ]
publicDir = "artifacts/key-claim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20612"
BASE_PATH = "/"
